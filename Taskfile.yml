version: "3"

tasks:
  setup:
    desc: Set up local development environment
    cmds:
      - mise install
      - lefthook install

  fmt:
    desc: Check code formatting
    cmds:
      - |
        unformatted=$(gofmt -s -l .)
        if [ -n "$unformatted" ]; then
          echo "The following files are not formatted:"
          echo "$unformatted"
          exit 1
        fi
      - uv run ruff format --check .
      - uv run ruff check .
      - uv run pyright .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  staticcheck:
    desc: Run staticcheck
    cmds:
      - staticcheck ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...
      - uv run pytest evals/

  test-msan:
    desc: Run tests with memory sanitizer (requires clang)
    env:
      CC: clang
      CGO_ENABLED: "1"
    cmds:
      - go test -msan ./...

  test-asan:
    desc: Run tests with address sanitizer (requires clang)
    env:
      CC: clang
      CGO_ENABLED: "1"
    cmds:
      - go test -asan ./...

  check:
    desc: Run all pre-push checks
    deps: [fmt, vet, staticcheck, test]

  ci:
    desc: Run all CI checks
    deps: [check, test-msan, test-asan]

  eval:
    desc: Run LLM evals (Inspect AI)
    cmds:
      - go build -o starlark-mcp .
      - uv run inspect eval evals/eval.py {{.CLI_ARGS}}

  eval:errors:
    desc: Summarize MCP tool errors from the latest eval log
    cmds:
      - uv run python evals/errors.py {{.CLI_ARGS}}

  eval:view:
    desc: Open Inspect AI log viewer
    cmds:
      - uv run inspect view {{.CLI_ARGS}}
